<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Watch and stream high-quality videos from our curated collection. Free video streaming platform with a wide variety of content.">
    <meta name="keywords" content="video streaming, watch videos, online videos, free videos, video gallery">
    <meta name="author" content="Video Gallery">
    <meta name="robots" content="index, follow">
    <meta property="og:title" content="Video Gallery - Watch Free Videos Online">
    <meta property="og:description" content="Stream high-quality videos from our curated collection">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://your-domain.com">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Video Gallery - Watch Free Videos Online">
    <meta name="twitter:description" content="Stream high-quality videos from our curated collection">
    <link rel="canonical" href="https://your-domain.com">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <title>Video Gallery - Watch Free Videos Online | Stream HD Content</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #ec4899;
            --bg-dark: #0f0f1a;
            --bg-card: #1a1a2e;
            --bg-hover: #252542;
            --text-primary: #ffffff;
            --text-secondary: #a1a1aa;
            --gradient-1: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --gradient-2: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            --shadow-hover: 0 35px 60px -15px rgba(0, 0, 0, 0.6);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html {
            scroll-behavior: smooth;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-dark);
            min-height: 100vh;
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
        }
        
        /* Animated Background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse at 20% 80%, rgba(120, 119, 198, 0.3) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(255, 119, 198, 0.3) 0%, transparent 50%),
                radial-gradient(ellipse at 40% 40%, rgba(99, 102, 241, 0.2) 0%, transparent 50%);
            z-index: -1;
            animation: bgPulse 15s ease-in-out infinite;
        }
        
        @keyframes bgPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 0 24px;
        }
        
        /* Navigation */
        nav {
            position: sticky;
            top: 0;
            background: rgba(15, 15, 26, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 100;
            padding: 16px 0;
        }
        
        .nav-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .logo svg {
            width: 32px;
            height: 32px;
            fill: url(#logoGradient);
        }
        
        /* Hero Section */
        .hero {
            text-align: center;
            padding: 80px 20px 60px;
            position: relative;
        }
        
        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(99, 102, 241, 0.2);
            border: 1px solid rgba(99, 102, 241, 0.3);
            padding: 8px 16px;
            border-radius: 50px;
            font-size: 0.875rem;
            color: #818cf8;
            margin-bottom: 24px;
            animation: fadeInUp 0.6s ease;
        }
        
        .hero h1 {
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 20px;
            animation: fadeInUp 0.6s ease 0.1s both;
        }
        
        .hero h1 span {
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .hero-subtitle {
            font-size: 1.25rem;
            color: var(--text-secondary);
            max-width: 600px;
            margin: 0 auto 40px;
            animation: fadeInUp 0.6s ease 0.2s both;
        }
        
        .stats {
            display: flex;
            justify-content: center;
            gap: 48px;
            margin-top: 48px;
            animation: fadeInUp 0.6s ease 0.3s both;
        }
        
        .stat {
            text-align: center;
        }
        
        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            background: var(--gradient-2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .stat-label {
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-top: 4px;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* Search & Filter */
        .controls {
            display: flex;
            gap: 16px;
            margin-bottom: 40px;
            flex-wrap: wrap;
            animation: fadeInUp 0.6s ease 0.4s both;
        }
        
        .search-box {
            flex: 1;
            min-width: 280px;
            position: relative;
        }
        
        .search-box input {
            width: 100%;
            padding: 14px 20px 14px 48px;
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        
        .search-box input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }
        
        .search-box svg {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 20px;
            color: var(--text-secondary);
        }
        
        /* Gallery Grid */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
            margin-bottom: 80px;
        }
        
        .video-card {
            background: var(--bg-card);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
        }
        
        .video-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--gradient-1);
            opacity: 0;
            transition: opacity 0.4s ease;
            z-index: 0;
        }
        
        .video-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: var(--shadow-hover);
            border-color: rgba(99, 102, 241, 0.3);
        }
        
        .video-card:hover::before {
            opacity: 0.1;
        }
        
        .video-card > * {
            position: relative;
            z-index: 1;
        }
        
        .thumbnail {
            position: relative;
            width: 100%;
            padding-top: 56.25%;
            background: linear-gradient(135deg, #1a1a2e 0%, #0f0f1a 100%);
            overflow: hidden;
        }
        
        .thumbnail img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .video-card:hover .thumbnail img {
            transform: scale(1.1);
        }
        
        .thumbnail-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 50%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .video-card:hover .thumbnail-overlay {
            opacity: 1;
        }
        
        .play-button {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            width: 72px;
            height: 72px;
            background: var(--gradient-1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 40px rgba(99, 102, 241, 0.4);
        }
        
        .video-card:hover .play-button {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }
        
        .play-button svg {
            width: 28px;
            height: 28px;
            fill: white;
            margin-left: 4px;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }
        
        .duration {
            position: absolute;
            bottom: 12px;
            right: 12px;
            background: rgba(0, 0, 0, 0.8);
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        
        .video-info {
            padding: 20px;
        }
        
        .video-title {
            font-size: 1.125rem;
            font-weight: 600;
            margin-bottom: 12px;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            color: var(--text-primary);
        }
        
        .video-meta {
            display: flex;
            align-items: center;
            gap: 16px;
            color: var(--text-secondary);
            font-size: 0.875rem;
        }
        
        .video-meta span {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .video-meta svg {
            width: 16px;
            height: 16px;
        }
        
        /* Loading State */
        .loading-container {
            text-align: center;
            padding: 100px 20px;
        }
        
        .spinner {
            width: 60px;
            height: 60px;
            position: relative;
            margin: 0 auto 30px;
        }
        
        .spinner::before,
        .spinner::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border: 3px solid transparent;
        }
        
        .spinner::before {
            border-top-color: var(--primary);
            animation: spin 1s linear infinite;
        }
        
        .spinner::after {
            border: 3px solid rgba(99, 102, 241, 0.2);
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Error & Empty States */
        .error-container,
        .empty-container {
            text-align: center;
            padding: 100px 20px;
            max-width: 500px;
            margin: 0 auto;
        }
        
        .error-icon,
        .empty-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 24px;
            background: var(--bg-card);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
        }
        
        .error-container h2,
        .empty-container h2 {
            font-size: 1.5rem;
            margin-bottom: 12px;
        }
        
        .error-container p,
        .empty-container p {
            color: var(--text-secondary);
            margin-bottom: 24px;
        }
        
        .retry-btn {
            background: var(--gradient-1);
            color: white;
            border: none;
            padding: 12px 32px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .retry-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.4);
        }
        
        /* Video Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(10px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .modal.active {
            display: flex;
            opacity: 1;
        }
        
        .modal-content {
            width: 90%;
            max-width: 1400px;
            position: relative;
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }
        
        .modal.active .modal-content {
            transform: scale(1);
        }
        
        .modal video {
            width: 100%;
            border-radius: 16px;
            box-shadow: 0 50px 100px -20px rgba(0, 0, 0, 0.8);
        }
        
        .modal-close {
            position: absolute;
            top: -60px;
            right: 0;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: #fff;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 12px;
            border-radius: 12px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .modal-close:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: rotate(90deg);
        }
        
        .video-title-bar {
            position: absolute;
            bottom: -60px;
            left: 0;
            right: 0;
            text-align: center;
            padding: 16px;
        }
        
        .video-title-bar h3 {
            font-size: 1.25rem;
            font-weight: 600;
        }
        
        /* Footer */
        footer {
            text-align: center;
            padding: 40px 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-secondary);
            font-size: 0.875rem;
        }
        
        footer a {
            color: var(--primary);
            text-decoration: none;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .hero {
                padding: 60px 20px 40px;
            }
            
            .stats {
                flex-direction: column;
                gap: 24px;
            }
            
            .gallery {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            
            .controls {
                flex-direction: column;
            }
            
            .search-box {
                min-width: 100%;
            }
        }
        
        /* Skeleton Loading */
        .skeleton {
            background: linear-gradient(90deg, var(--bg-card) 25%, var(--bg-hover) 50%, var(--bg-card) 75%);
            background-size: 200% 100%;
            animation: skeleton 1.5s infinite;
            border-radius: 8px;
        }
        
        @keyframes skeleton {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
        }
        
        ::-webkit-scrollbar-track {
            background: var(--bg-dark);
        }
        
        ::-webkit-scrollbar-thumb {
            background: var(--bg-card);
            border-radius: 5px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: var(--bg-hover);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1 id="gallery-title">Video Gallery</h1>
            <p class="subtitle">Watch videos from our collection</p>
        </header>
        
        <div id="gallery-content">
            <div class="loading">
                <div class="spinner"></div>
                <p>Loading videos...</p>
            </div>
        </div>
    </div>
    
    <!-- Video Player Modal -->
    <div id="video-modal" class="modal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">&times;</button>
            <video id="video-player" controls autoplay>
                <source src="" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>
    </div>

    <script>
        // CONFIGURATION - Change this to your VPS backend URL
        const API_BASE_URL = 'http://127.0.0.1:8000';
        
        // Load gallery data
        async function loadGallery() {
            const galleryContent = document.getElementById('gallery-content');
            
            try {
                const response = await fetch(`${API_BASE_URL}/api/gallery`);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                
                if (data.error) {
                    throw new Error(data.error);
                }
                
                // Update title
                if (data.gallery_title) {
                    document.getElementById('gallery-title').textContent = data.gallery_title;
                    document.title = data.gallery_title;
                }
                
                // Render videos
                if (!data.videos || data.videos.length === 0) {
                    galleryContent.innerHTML = `
                        <div class="empty">
                            <h2>No videos found</h2>
                            <p>Add videos to topics in the database group to see them here.</p>
                        </div>
                    `;
                    return;
                }
                
                const galleryHTML = `
                    <div class="gallery">
                        ${data.videos.map(video => `
                            <div class="video-card" onclick="playVideo('${video.stream_url}', '${escapeHtml(video.title)}')">
                                <div class="thumbnail">
                                    ${video.thumbnail_url ? 
                                        `<img src="${video.thumbnail_url}" alt="${escapeHtml(video.title)}" loading="lazy">` :
                                        `<div style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
                                            <span style="font-size: 3rem;">🎬</span>
                                        </div>`
                                    }
                                    <div class="play-button">
                                        <svg viewBox="0 0 24 24">
                                            <path d="M8 5v14l11-7z"/>
                                        </svg>
                                    </div>
                                </div>
                                <div class="video-info">
                                    <div class="video-title">${escapeHtml(video.title)}</div>
                                    ${video.created_at ? `<div class="video-date">${formatDate(video.created_at)}</div>` : ''}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
                
                galleryContent.innerHTML = galleryHTML;
                
            } catch (error) {
                console.error('Error loading gallery:', error);
                galleryContent.innerHTML = `
                    <div class="error">
                        <h2>Error loading gallery</h2>
                        <p>${escapeHtml(error.message)}</p>
                        <p style="margin-top: 20px; font-size: 0.9rem;">
                            Make sure the API_BASE_URL is configured correctly.
                        </p>
                    </div>
                `;
            }
        }
        
        // Play video in modal
        function playVideo(url, title) {
            const modal = document.getElementById('video-modal');
            const player = document.getElementById('video-player');
            
            player.src = url;
            player.load();
            modal.classList.add('active');
            
            // Update page title
            document.title = `${title} - Video Gallery`;
        }
        
        // Close modal
        function closeModal() {
            const modal = document.getElementById('video-modal');
            const player = document.getElementById('video-player');
            
            player.pause();
            player.src = '';
            modal.classList.remove('active');
            
            // Restore original title
            const galleryTitle = document.getElementById('gallery-title').textContent;
            document.title = galleryTitle;
        }
        
        // Close modal on background click
        document.getElementById('video-modal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });
        
        // Close modal on Escape key
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeModal();
            }
        });
        
        // Utility: Escape HTML
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Utility: Format date
        function formatDate(dateString) {
            try {
                const date = new Date(dateString);
                return date.toLocaleDateString('en-US', {
                    year: 'numeric',
                    month: 'short',
                    day: 'numeric'
                });
            } catch {
                return dateString;
            }
        }
        
        // Load gallery on page load
        loadGallery();
    </script>
</body>
</html>
